<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <title>Barber App - Gestión de Citas</title>
    <script>
      // Suppress benign Vite WebSocket connection errors in AI Studio environment
      (function() {
        const originalError = console.error;
        const originalWarn = console.warn;
        
        const isBenignViteError = (msg) => 
          typeof msg === 'string' && (
            msg.includes('[vite] No se pudo conectar con el websocket') ||
            msg.includes('WebSocket cerrado sin haber abierto') ||
            msg.includes('WebSocket cerrado sin abrirse') ||
            msg.includes('[vite] failed to connect to websocket') ||
            msg.includes('failed to connect to websocket') ||
            msg.includes('WebSocket connection to')
          );

        console.error = function(...args) {
          if (args.some(isBenignViteError)) return;
          originalError.apply(console, args);
        };

        console.warn = function(...args) {
          if (args.some(isBenignViteError)) return;
          originalWarn.apply(console, args);
        };

        window.addEventListener('unhandledrejection', function(event) {
          if (isBenignViteError(event.reason) || (event.reason && isBenignViteError(event.reason.message))) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
